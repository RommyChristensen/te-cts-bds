<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efficiency Race - Game Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #404040 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .game-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .game-title {
            font-size: 3rem;
            color: #ffffff;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .game-subtitle {
            color: #c0c0c0;
            font-size: 1.2rem;
        }

        .waiting-room {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .waiting-title {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 2rem;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .team-name {
            font-size: 1.5rem;
            color: #c0c0c0;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .players-list {
            list-style: none;
        }

        .player-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            color: #ffffff;
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            color: #c0c0c0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        .start-button {
            background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
            color: #ffffff;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(81, 207, 102, 0.3);
        }

        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .admin-controls {
            background: rgba(192, 192, 192, 0.2);
            border: 1px solid rgba(192, 192, 192, 0.3);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }

        .admin-controls h4 {
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .back-button {
            background: rgba(192, 192, 192, 0.2);
            color: #ffffff;
            border: 1px solid rgba(192, 192, 192, 0.3);
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .back-button:hover {
            background: rgba(192, 192, 192, 0.3);
        }

        .status-message {
            background: rgba(81, 207, 102, 0.2);
            color: #51cf66;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            border: 1px solid rgba(81, 207, 102, 0.3);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 1rem;
            }

            .game-title {
                font-size: 2rem;
            }

            .waiting-room {
                padding: 2rem 1rem;
            }

            .teams-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .team-card {
                padding: 1.5rem;
            }

            .game-info {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <a href="/user-dashboard" class="back-button">← Kembali ke Dashboard</a>
        
        <div class="game-header">
            <h1 class="game-title">EFFICIENCY RACE</h1>
            <p class="game-subtitle">Waiting Room - Menunggu pemain bergabung...</p>
        </div>

        <div class="waiting-room">
            <h2 class="waiting-title">🏁 Waiting Room</h2>
            
            <div class="game-info">
                <div class="info-card">
                    <div class="info-label">Durasi</div>
                    <div class="info-value" id="gameDuration">30 menit</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Reward</div>
                    <div class="info-value" id="rewardCoins">100 coins</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Status</div>
                    <div class="info-value" id="gameStatus">Menunggu</div>
                </div>
            </div>

            <div class="status-message" id="statusMessage">
                Game akan dimulai ketika semua pemain telah bergabung...
            </div>

            <div class="teams-grid" id="teamsContainer">
                <!-- Teams will be loaded here -->
            </div>

            <button class="start-button" id="startButton" disabled>Start Game</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let gameData = null;

        // Get current user and game info
        async function initializeGame() {
            try {
                // Get user info
                const userResponse = await fetch('/api/user-info');
                if (userResponse.ok) {
                    currentUser = await userResponse.json();
                }

                // Get active game info
                const gameResponse = await fetch('/api/active-game');
                if (gameResponse.ok) {
                    const result = await gameResponse.json();
                    gameData = result.game;
                    
                    if (gameData) {
                        updateGameInfo();
                        loadTeams();
                    }
                }

                // Connect to socket
                const userType = currentUser && !currentUser.isAdmin ? 'user' : 'admin';
                const username = currentUser ? currentUser.username : null;
                
                console.log('User info:', currentUser);
                console.log('User type:', userType);
                console.log('Username:', username);
                
                socket.emit('authenticate', { userType, username });
                
                // Check if admin and show admin controls
                if (!currentUser || currentUser.isAdmin) {
                    console.log('Showing admin controls...');
                    showAdminControls();
                } else {
                    console.log('User detected, not showing admin controls');
                }
                
                // Request current players list
                socket.emit('get-players');
                
            } catch (error) {
                console.error('Error initializing game:', error);
            }
        }

        function showAdminControls() {
            // Add admin controls to the waiting room
            const adminControls = document.createElement('div');
            adminControls.innerHTML = `
                <div class="admin-controls">
                    <h4>🔧 Admin Controls</h4>
                    <button class="start-button" id="adminStartButton" onclick="startGameAsAdmin()">Start Game</button>
                    <button class="back-button" style="margin-left: 1rem;" onclick="endGame()">End Game</button>
                </div>
            `;
            
            const waitingRoom = document.querySelector('.waiting-room');
            const statusMessage = document.getElementById('statusMessage');
            waitingRoom.insertBefore(adminControls, statusMessage.nextSibling);
            
            // Ensure admin start button is enabled
            setTimeout(() => {
                const adminStartButton = document.getElementById('adminStartButton');
                if (adminStartButton) {
                    adminStartButton.disabled = false;
                    console.log('Admin start button enabled');
                }
            }, 100);
        }

        function startGameAsAdmin() {
            console.log('Start game button clicked by admin');
            if (confirm('Apakah Anda yakin ingin memulai game?')) {
                console.log('Emitting start-game event...');
                socket.emit('start-game');
            } else {
                console.log('Start game cancelled by admin');
            }
        }

        function endGame() {
            if (confirm('Apakah Anda yakin ingin mengakhiri game?')) {
                socket.emit('end-game');
                window.close(); // Close the game room tab
            }
        }

        function updateGameInfo() {
            if (gameData) {
                document.getElementById('gameDuration').textContent = `${gameData.duration} menit`;
                document.getElementById('rewardCoins').textContent = `${gameData.rewardCoins} coins`;
                document.getElementById('gameStatus').textContent = gameData.status === 'active' ? 'Aktif' : 'Menunggu';
            }
        }

        function loadTeams() {
            if (!gameData) return;

            const teamsContainer = document.getElementById('teamsContainer');
            teamsContainer.innerHTML = '';

            gameData.teams.forEach(teamName => {
                const maxPlayers = gameData.teamPlayers[teamName] || 0;
                
                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                teamCard.innerHTML = `
                    <h3 class="team-name">${teamName}</h3>
                    <p style="color: #c0c0c0; margin-bottom: 1rem;">${maxPlayers} pemain maksimal</p>
                    <ul class="players-list" id="players-${teamName.replace(/\s+/g, '-')}">
                        <li class="player-item">Menunggu pemain...</li>
                    </ul>
                `;
                teamsContainer.appendChild(teamCard);
            });
        }

        function updatePlayersList(players) {
            if (!gameData || !players) return;

            // Clear all team lists first
            gameData.teams.forEach(teamName => {
                const teamList = document.getElementById(`players-${teamName.replace(/\s+/g, '-')}`);
                if (teamList) {
                    teamList.innerHTML = '';
                }
            });

            // Group players by team
            const playersByTeam = {};
            players.forEach(player => {
                if (!playersByTeam[player.tim]) {
                    playersByTeam[player.tim] = [];
                }
                playersByTeam[player.tim].push(player);
            });

            // Update each team list
            gameData.teams.forEach(teamName => {
                const teamList = document.getElementById(`players-${teamName.replace(/\s+/g, '-')}`);
                if (teamList) {
                    const teamPlayers = playersByTeam[teamName] || [];
                    
                    if (teamPlayers.length === 0) {
                        teamList.innerHTML = '<li class="player-item">Belum ada pemain</li>';
                    } else {
                        teamPlayers.forEach(player => {
                            const playerItem = document.createElement('li');
                            playerItem.className = 'player-item';
                            playerItem.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span>${player.nama}</span>
                                    <span style="color: #51cf66; font-size: 0.8rem;">✓ Joined</span>
                                </div>
                            `;
                            teamList.appendChild(playerItem);
                        });
                    }
                }
            });
        }

        // Socket event listeners
        socket.on('player-joined', (data) => {
            console.log('Player joined:', data);
            // Request current players list
            socket.emit('get-players');
        });

        socket.on('players-updated', (data) => {
            console.log('Players updated:', data);
            updatePlayersList(data.players);
        });

        socket.on('game-started', (data) => {
            document.getElementById('gameStatus').textContent = 'Berlangsung';
            document.getElementById('statusMessage').textContent = 'Game sedang berlangsung!';
            
            // Disable start button for both user and admin
            const startButton = document.getElementById('startButton');
            const adminStartButton = document.getElementById('adminStartButton');
            if (startButton) startButton.disabled = true;
            if (adminStartButton) adminStartButton.disabled = true;
        });

        socket.on('game-ended', (data) => {
            document.getElementById('gameStatus').textContent = 'Berakhir';
            document.getElementById('statusMessage').textContent = 'Game telah berakhir!';
            
            // Clear player lists
            gameData.teams.forEach(teamName => {
                const teamList = document.getElementById(`players-${teamName.replace(/\s+/g, '-')}`);
                if (teamList) {
                    teamList.innerHTML = '<li class="player-item">Menunggu pemain...</li>';
                }
            });
            
            // Enable start button for admin
            setTimeout(() => {
                const adminStartButton = document.getElementById('adminStartButton');
                if (adminStartButton) {
                    adminStartButton.disabled = false;
                    console.log('Admin start button re-enabled after game ended');
                }
            }, 100);
        });

        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeGame);
    </script>
</body>
</html>
